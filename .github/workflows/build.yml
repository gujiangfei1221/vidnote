# ═══════════════════════════════════════════════════
# 自动构建 & 发布 — macOS + Windows + Linux
# 产物：6 种（3 平台 × Electron 桌面应用 + CLI 二进制包）
# 触发条件：推送 main 分支自动构建；支持手动触发
# ═══════════════════════════════════════════════════

name: Build Desktop App & CLI

on:
  push:
    branches:
      - main
    # tags:
    #   - 'v*'
  workflow_dispatch:   # 支持手动触发

permissions:
  contents: write      # 允许上传 Release

jobs:
  # ──────────────────────────────────────────────────
  # macOS 构建 (Apple Silicon / ARM64)
  # 产物：Electron DMG/ZIP + CLI tar.gz
  # ──────────────────────────────────────────────────
  build-mac:
    runs-on: macos-14   # Apple Silicon M1 runner
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 安装 Python 依赖
        run: |
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: 🔨 PyInstaller 打包 Python 后端
        working-directory: backend
        run: |
          pyinstaller --name api_backend --onefile \
            --add-data "processor:processor" \
            --add-data "config.py:." \
            --add-data "../.env.example:." \
            --hidden-import opencc \
            --hidden-import yt_dlp \
            --hidden-import requests \
            --hidden-import dotenv \
            --hidden-import watchdog \
            --collect-data opencc \
            --distpath ../dist \
            api.py

      - name: 📥 安装 FFmpeg (macOS ARM64)
        run: |
          brew update
          brew install ffmpeg
          cp "$(which ffmpeg)" ffmpeg_bin
          chmod +x ffmpeg_bin

      - name: 🔨 编译 whisper.cpp (Metal GPU 加速)
        run: |
          git clone --depth 1 https://github.com/ggerganov/whisper.cpp.git /tmp/whisper.cpp
          cd /tmp/whisper.cpp
          cmake -B build -DWHISPER_METAL=ON
          cmake --build build --config Release -j$(sysctl -n hw.physicalcpu)

      - name: 📥 下载 Whisper 模型 (base, 141MB)
        run: |
          curl -L -o ggml-base.bin \
            "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.bin"

      - name: 📁 组装 resources 目录
        run: |
          mkdir -p app/resources
          cp dist/api_backend           app/resources/
          cp ffmpeg_bin                  app/resources/ffmpeg
          cp /tmp/whisper.cpp/build/bin/whisper-cli  app/resources/
          cp ggml-base.bin              app/resources/
          # 拷贝 whisper.cpp 运行时依赖的动态库
          find /tmp/whisper.cpp/build -name "*.dylib" -exec cp {} app/resources/ \;
          # 拷贝 Metal shader (如果存在)
          find /tmp/whisper.cpp/build -name "*.metallib" -exec cp {} app/resources/ \; 2>/dev/null || true
          # 修正 whisper-cli 和 dylib 的运行时搜索路径，避免引用构建机 /tmp 下的绝对路径
          install_name_tool -add_rpath "@executable_path" app/resources/whisper-cli || true
          for lib in app/resources/*.dylib; do
            [ -f "$lib" ] || continue
            install_name_tool -id "@rpath/$(basename "$lib")" "$lib" || true
            install_name_tool -add_rpath "@loader_path" "$lib" || true
          done
          # 确保所有二进制可执行
          chmod +x app/resources/api_backend app/resources/ffmpeg app/resources/whisper-cli app/resources/*.dylib

      # ── CLI 产物：打包自包含 tar.gz ──
      - name: 📦 打包 CLI 二进制 (macOS)
        run: |
          mkdir -p cli-release/vidnote-cli
          cp app/resources/api_backend    cli-release/vidnote-cli/
          cp app/resources/ffmpeg         cli-release/vidnote-cli/
          cp app/resources/whisper-cli    cli-release/vidnote-cli/
          cp app/resources/ggml-base.bin  cli-release/vidnote-cli/
          # 拷贝动态库
          cp app/resources/*.dylib        cli-release/vidnote-cli/ 2>/dev/null || true
          cp app/resources/*.metallib     cli-release/vidnote-cli/ 2>/dev/null || true
          # 拷贝 .env 模板
          cp .env.example                 cli-release/vidnote-cli/.env.example
          # 创建启动说明
          printf 'VidNote CLI - 视频知识萃取工具\n\n' > cli-release/vidnote-cli/README.txt
          printf '使用前：\n' >> cli-release/vidnote-cli/README.txt
          printf '  1. 复制 .env.example 为 .env\n' >> cli-release/vidnote-cli/README.txt
          printf '  2. 编辑 .env，填入你的硅基流动 API Key\n\n' >> cli-release/vidnote-cli/README.txt
          printf '使用方法：\n' >> cli-release/vidnote-cli/README.txt
          printf '  ./api_backend info <视频链接>\n' >> cli-release/vidnote-cli/README.txt
          printf '  ./api_backend process <视频链接> --json\n' >> cli-release/vidnote-cli/README.txt
          printf '  ./api_backend process <视频链接> -o ./output\n' >> cli-release/vidnote-cli/README.txt
          cd cli-release
          tar -czf ../vidnote-cli-mac-arm64.tar.gz vidnote-cli/

      # ── Electron 产物 ──
      - name: 📦 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🏗️ 构建 Electron 应用 (macOS)
        run: |
          cd app
          npm install
          npm run build:mac

      - name: 📤 上传 macOS Electron 产物
        uses: actions/upload-artifact@v4
        with:
          name: release-mac-electron
          path: |
            app/dist/*.dmg
            app/dist/*.zip

      - name: 📤 上传 macOS CLI 产物
        uses: actions/upload-artifact@v4
        with:
          name: release-mac-cli
          path: vidnote-cli-mac-arm64.tar.gz

      # 如果是 tag 推送，自动创建 Release
      - name: 🚀 发布到 GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/dist/*.dmg
            app/dist/*.zip
            vidnote-cli-mac-arm64.tar.gz
          draft: true
          generate_release_notes: true

  # ──────────────────────────────────────────────────
  # Windows 构建 (x64)
  # 产物：Electron EXE + CLI zip
  # ──────────────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 安装 Python 依赖
        shell: bash
        run: |
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: 🔨 PyInstaller 打包 Python 后端
        shell: bash
        working-directory: backend
        run: |
          pyinstaller --name api_backend --onefile \
            --add-data "processor;processor" \
            --add-data "config.py;." \
            --add-data "../.env.example;." \
            --hidden-import opencc \
            --hidden-import yt_dlp \
            --hidden-import requests \
            --hidden-import dotenv \
            --hidden-import watchdog \
            --collect-data opencc \
            --distpath ../dist \
            api.py

      - name: 📥 下载静态 FFmpeg (Windows x64)
        shell: bash
        run: |
          curl -L -o ffmpeg.zip \
            "https://github.com/yt-dlp/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          unzip -q ffmpeg.zip
          find . -name "ffmpeg.exe" -type f -path "*/bin/ffmpeg.exe" | head -1 | xargs -I{} cp {} ffmpeg_win.exe

      - name: 🔨 编译 whisper.cpp (CPU)
        shell: bash
        run: |
          git clone --depth 1 https://github.com/ggerganov/whisper.cpp.git /tmp/whisper_cpp
          cd /tmp/whisper_cpp
          cmake -B build
          cmake --build build --config Release

      - name: 📥 下载 Whisper 模型 (base, 141MB)
        shell: bash
        run: |
          curl -L -o ggml-base.bin \
            "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.bin"

      - name: 📁 组装 resources 目录
        shell: bash
        run: |
          mkdir -p app/resources
          cp dist/api_backend.exe       app/resources/
          cp ffmpeg_win.exe             app/resources/ffmpeg.exe
          # whisper.cpp MSVC 输出路径
          find /tmp/whisper_cpp/build -name "whisper-cli.exe" | head -1 | xargs -I{} cp {} app/resources/whisper-cli.exe
          cp ggml-base.bin              app/resources/

      # ── CLI 产物：打包自包含 zip ──
      - name: 📦 打包 CLI 二进制 (Windows)
        shell: bash
        run: |
          mkdir -p cli-release/vidnote-cli
          cp app/resources/api_backend.exe   cli-release/vidnote-cli/
          cp app/resources/ffmpeg.exe        cli-release/vidnote-cli/
          cp app/resources/whisper-cli.exe   cli-release/vidnote-cli/
          cp app/resources/ggml-base.bin     cli-release/vidnote-cli/
          # 拷贝可能的 DLL 依赖
          find /tmp/whisper_cpp/build -name "*.dll" -exec cp {} cli-release/vidnote-cli/ \; 2>/dev/null || true
          cp .env.example                    cli-release/vidnote-cli/.env.example
          cd cli-release
          7z a -tzip ../vidnote-cli-win-x64.zip vidnote-cli/

      # ── Electron 产物 ──
      - name: 📦 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🏗️ 构建 Electron 应用 (Windows)
        shell: bash
        run: |
          cd app
          npm install
          npm run build:win

      - name: 📤 上传 Windows Electron 产物
        uses: actions/upload-artifact@v4
        with:
          name: release-win-electron
          path: |
            app/dist/*.exe

      - name: 📤 上传 Windows CLI 产物
        uses: actions/upload-artifact@v4
        with:
          name: release-win-cli
          path: vidnote-cli-win-x64.zip

      - name: 🚀 发布到 GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/dist/*.exe
            vidnote-cli-win-x64.zip
          draft: true
          generate_release_notes: true

  # ──────────────────────────────────────────────────
  # Linux 构建 (x64)
  # 产物：Electron AppImage/deb + CLI tar.gz
  # ──────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg cmake libopenblas-dev

      - name: 📦 安装 Python 依赖
        run: |
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: 🔨 PyInstaller 打包 Python 后端
        working-directory: backend
        run: |
          pyinstaller --name api_backend --onefile \
            --add-data "processor:processor" \
            --add-data "config.py:." \
            --add-data "../.env.example:." \
            --hidden-import opencc \
            --hidden-import yt_dlp \
            --hidden-import requests \
            --hidden-import dotenv \
            --hidden-import watchdog \
            --collect-data opencc \
            --distpath ../dist \
            api.py

      - name: 📥 获取 FFmpeg 路径
        run: |
          cp "$(which ffmpeg)" ffmpeg_bin
          chmod +x ffmpeg_bin

      - name: 🔨 编译 whisper.cpp (CPU + OpenBLAS 加速)
        run: |
          git clone --depth 1 https://github.com/ggerganov/whisper.cpp.git /tmp/whisper.cpp
          cd /tmp/whisper.cpp
          cmake -B build -DWHISPER_BLAS=ON -DBLAS_LIB=OpenBLAS
          cmake --build build --config Release -j$(nproc)

      - name: 📥 下载 Whisper 模型 (base, 141MB)
        run: |
          curl -L -o ggml-base.bin \
            "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.bin"

      - name: 📁 组装 resources 目录
        run: |
          mkdir -p app/resources
          cp dist/api_backend            app/resources/
          cp ffmpeg_bin                   app/resources/ffmpeg
          cp /tmp/whisper.cpp/build/bin/whisper-cli  app/resources/
          cp ggml-base.bin               app/resources/
          # 拷贝 whisper.cpp 动态库
          find /tmp/whisper.cpp/build -name "*.so" -exec cp {} app/resources/ \; 2>/dev/null || true
          # 确保所有二进制可执行
          chmod +x app/resources/api_backend app/resources/ffmpeg app/resources/whisper-cli

      # ── CLI 产物：打包自包含 tar.gz ──
      - name: 📦 打包 CLI 二进制 (Linux)
        run: |
          mkdir -p cli-release/vidnote-cli
          cp app/resources/api_backend    cli-release/vidnote-cli/
          cp app/resources/ffmpeg         cli-release/vidnote-cli/
          cp app/resources/whisper-cli    cli-release/vidnote-cli/
          cp app/resources/ggml-base.bin  cli-release/vidnote-cli/
          # 拷贝 .so 动态库
          cp app/resources/*.so           cli-release/vidnote-cli/ 2>/dev/null || true
          cp .env.example                 cli-release/vidnote-cli/.env.example
          # 创建启动脚本（自动设置 LD_LIBRARY_PATH）
          printf '#!/bin/bash\n' > cli-release/vidnote-cli/vidnote
          printf '# VidNote CLI 启动脚本\n' >> cli-release/vidnote-cli/vidnote
          printf 'SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"\n' >> cli-release/vidnote-cli/vidnote
          printf 'export LD_LIBRARY_PATH="$SCRIPT_DIR:$LD_LIBRARY_PATH"\n' >> cli-release/vidnote-cli/vidnote
          printf 'export FFMPEG_PATH="$SCRIPT_DIR/ffmpeg"\n' >> cli-release/vidnote-cli/vidnote
          printf 'export WHISPER_CPP_PATH="$SCRIPT_DIR/whisper-cli"\n' >> cli-release/vidnote-cli/vidnote
          printf 'export WHISPER_MODEL_PATH="$SCRIPT_DIR/ggml-base.bin"\n' >> cli-release/vidnote-cli/vidnote
          printf 'exec "$SCRIPT_DIR/api_backend" "$@"\n' >> cli-release/vidnote-cli/vidnote
          chmod +x cli-release/vidnote-cli/vidnote
          cd cli-release
          tar -czf ../vidnote-cli-linux-x64.tar.gz vidnote-cli/

      # ── Electron 产物 ──
      - name: 📦 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🏗️ 构建 Electron 应用 (Linux)
        run: |
          cd app
          npm install
          npm run build:linux

      - name: 📤 上传 Linux Electron 产物
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-electron
          path: |
            app/dist/*.AppImage
            app/dist/*.deb

      - name: 📤 上传 Linux CLI 产物
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-cli
          path: vidnote-cli-linux-x64.tar.gz

      - name: 🚀 发布到 GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/dist/*.AppImage
            app/dist/*.deb
            vidnote-cli-linux-x64.tar.gz
          draft: true
          generate_release_notes: true
